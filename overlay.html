<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Volleyball Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 1920px; height: 1080px; overflow: hidden; font-family: 'Barlow Condensed', sans-serif; }

  /* COMPETITION */
  #competition { position: absolute; top: 32px; left: 40px; animation: slideIn 0.6s ease both; }
  .comp-label { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #f0a500; text-transform: uppercase; text-shadow: 0 1px 8px rgba(0,0,0,0.9); display: block; }
  .comp-name  { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: 0 2px 14px rgba(0,0,0,0.95); display: block; }

  /* SPONSOR BANNER */
  #sponsor {
    position: absolute; top: 28px; right: 40px;
    background: #fff; border-radius: 12px;
    padding: 10px 16px;
    display: none; align-items: center; justify-content: center;
    max-width: 300px; min-width: 120px; max-height: 120px;
    box-shadow: 0 4px 28px rgba(0,0,0,0.55);
    animation: fadeIn 0.4s ease both;
  }
  #sponsor.visible { display: flex; }
  #sponsor img { max-width: 268px; max-height: 100px; object-fit: contain; display: block; }
  #sponsor-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    color: #aaa; text-transform: uppercase; text-align: center;
    position: absolute; bottom: -18px; right: 0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  /* SCOREBOARD */
  #scoreboard { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; filter: drop-shadow(0 6px 28px rgba(0,0,0,0.75)); }

  .team-block { display: flex; align-items: center; background: #1a1a1a; height: 74px; padding: 0 22px; gap: 14px; min-width: 260px; }
  .team-block.home { clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 100%, 0 100%); padding-right: 32px; }
  .team-block.away { clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%); padding-left: 32px; }

  .team-logo { width: 46px; height: 46px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
  .team-logo img { width: 100%; height: 100%; object-fit: contain; display: none; }
  .team-logo img.visible { display: block; }
  .team-logo .emoji { line-height: 1; }
  .team-name { font-weight: 900; font-size: 28px; letter-spacing: 0.04em; color: #fff; text-transform: uppercase; white-space: nowrap; }

  .sets-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; height: 74px; width: 50px; gap: 2px; }
  .sets-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: #666; text-transform: uppercase; }
  .sets-value { font-size: 30px; font-weight: 900; color: #fff; line-height: 1; }

  .center-block { display: flex; align-items: center; background: #f0a500; height: 74px; }
  .score-box { display: flex; align-items: center; justify-content: center; width: 66px; height: 74px; }
  .score-value { font-size: 48px; font-weight: 900; color: #1a1a1a; line-height: 1; transition: transform 0.12s cubic-bezier(.36,.07,.19,.97); }
  .score-value.bump { transform: scale(1.3); }
  .score-sep { width: 3px; height: 38px; background: rgba(0,0,0,0.2); border-radius: 2px; }

  /* SET POPUP */
  #set-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #f0a500; color: #1a1a1a; padding: 18px 52px; font-size: 38px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; clip-path: polygon(14px 0, 100% 0, calc(100% - 14px) 100%, 0 100%); transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 100; white-space: nowrap; }
  #set-popup.show { transform: translate(-50%, -50%) scale(1); }


  /* TICKER */
  #ticker-wrap {
    position: absolute;
    bottom: 4px; /* below scoreboard */
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    background: #1a1a1a;
    height: 34px;
    overflow: hidden;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.6));
    white-space: nowrap;
  }
  #ticker-wrap.visible { display: flex; }

  #ticker-tag {
    background: #f0a500;
    color: #1a1a1a;
    font-size: 13px; font-weight: 900;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0 14px;
    height: 100%; display: flex; align-items: center;
    flex-shrink: 0;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 100%, 0 100%);
    padding-right: 20px;
  }

  #ticker-track {
    overflow: hidden;
    flex: 1;
    height: 100%;
    position: relative;
  }

  #ticker-text {
    display: inline-block;
    white-space: nowrap;
    font-size: 18px; font-weight: 700;
    color: #fff; letter-spacing: 0.04em;
    line-height: 34px;
    padding-left: 100vw;
    animation: ticker-scroll linear infinite;
  }

  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(calc(-100% - 100vw)); }
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeIn  { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div id="competition">
  <span class="comp-label" id="comp-label-el">Eccellenza FIPAV</span>
  <span class="comp-name"  id="comp-name-el">Finale 3° - 4° Posto</span>
</div>

<!-- SPONSOR BANNER -->
<div id="sponsor">
  <img id="sponsor-img" alt="Sponsor">
  <span id="sponsor-label">Sponsor</span>
</div>

<!-- TICKER -->
<div id="ticker-wrap">
  <div id="ticker-tag">📢 News</div>
  <div id="ticker-track">
    <span id="ticker-text"></span>
  </div>
</div>

<div id="scoreboard">
  <div class="team-block home">
    <div class="team-logo" id="home-logo-wrap">
      <span class="emoji">🏐</span>
      <img id="home-logo-img" alt="">
    </div>
    <span class="team-name" id="home-name">CASA</span>
  </div>
  <div class="sets-box">
    <span class="sets-label">Set</span>
    <span class="sets-value" id="home-sets">0</span>
  </div>
  <div class="center-block">
    <div class="score-box"><span class="score-value" id="home-score">0</span></div>
    <div class="score-sep"></div>
    <div class="score-box"><span class="score-value" id="away-score">0</span></div>
  </div>
  <div class="sets-box">
    <span class="sets-label">Set</span>
    <span class="sets-value" id="away-sets">0</span>
  </div>
  <div class="team-block away">
    <span class="team-name" id="away-name">OSPITE</span>
    <div class="team-logo" id="away-logo-wrap">
      <span class="emoji">🏐</span>
      <img id="away-logo-img" alt="">
    </div>
  </div>
</div>

<div id="set-popup">SET!</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCJLdA9iKxoR3WJSrjGM7ltUpjpDRNyiyQ",
    authDomain: "volley-overlay.firebaseapp.com",
    databaseURL: "https://volley-overlay-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "volley-overlay",
    storageBucket: "volley-overlay.firebasestorage.app",
    messagingSenderId: "643750913822",
    appId: "1:643750913822:web:3c1fde3fdceb6a71e3cb0f"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  let prev = {};

  function bump(id) {
    const el = document.getElementById(id);
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
  }

  function showPopup(name) {
    const p = document.getElementById('set-popup');
    p.textContent = 'SET — ' + name;
    p.classList.add('show');
    setTimeout(() => p.classList.remove('show'), 2800);
  }

  function applyLogo(team, url) {
    const img = document.getElementById(team + '-logo-img');
    const emoji = img.previousElementSibling;
    if (url) { img.src = url; img.classList.add('visible'); emoji.style.display = 'none'; }
    else      { img.classList.remove('visible'); emoji.style.display = 'block'; }
  }

  function applySponsor(url, label, visible) {
    const wrap = document.getElementById('sponsor');
    const img  = document.getElementById('sponsor-img');
    const lbl  = document.getElementById('sponsor-label');
    if (url && visible) {
      img.src = url;
      lbl.textContent = label || '';
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  }


  function applyTicker(text, visible) {
    const wrap  = document.getElementById('ticker-wrap');
    const span  = document.getElementById('ticker-text');
    const track = document.getElementById('ticker-track');
    if (text && visible) {
      span.textContent = text;
      wrap.classList.add('visible');
      // Calcola durata in base alla larghezza reale del testo
      // Il testo parte da destra (padding-left:100%) e scorre fino a scomparire a sinistra
      requestAnimationFrame(() => {
        const textWidth  = span.scrollWidth;
        const trackWidth = track.offsetWidth;
        // px/s: testo corto più lento, testo lungo proporzionale
        const speed    = 120; // px al secondo
        const duration = (textWidth + trackWidth) / speed;
        span.style.animationDuration = Math.max(5, duration) + 's';
      });
    } else {
      wrap.classList.remove('visible');
    }
  }

  onValue(ref(db, 'match'), (snap) => {
    const d = snap.val();
    if (!d) return;

    document.getElementById('comp-label-el').textContent = d.compLabel || '';
    document.getElementById('comp-name-el').textContent  = d.compName  || '';
    document.getElementById('home-name').textContent = (d.homeName || 'CASA').toUpperCase();
    document.getElementById('away-name').textContent = (d.awayName || 'OSPITE').toUpperCase();

    applyLogo('home', d.homeLogo || '');
    applyLogo('away', d.awayLogo || '');
    applySponsor(d.sponsorLogo || '', d.sponsorLabel || '', !!d.sponsorVisible);
    applyTicker(d.tickerText || '', !!d.tickerVisible);

    const hs = d.homeScore ?? 0, as2 = d.awayScore ?? 0;
    const hset = d.homeSets ?? 0, aset = d.awaySets ?? 0;

    if (hs   !== prev.homeScore) { document.getElementById('home-score').textContent = hs;   if (hs   > (prev.homeScore||0)) bump('home-score'); }
    if (as2  !== prev.awayScore) { document.getElementById('away-score').textContent = as2;  if (as2  > (prev.awayScore||0)) bump('away-score'); }
    if (hset !== prev.homeSets)  { document.getElementById('home-sets').textContent  = hset; if (hset > (prev.homeSets||0))  showPopup((d.homeName||'CASA').toUpperCase()); }
    if (aset !== prev.awaySets)  { document.getElementById('away-sets').textContent  = aset; if (aset > (prev.awaySets||0))  showPopup((d.awayName||'OSPITE').toUpperCase()); }

    prev = { homeScore: hs, awayScore: as2, homeSets: hset, awaySets: aset };
  });
</script>
</body>
</html>
