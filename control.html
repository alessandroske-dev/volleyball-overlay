<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Volley Control</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0a500;
    --dark: #111;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --text: #fff;
    --muted: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100dvh;
    padding: 0 0 40px;
  }

  header {
    background: #161616;
    border-bottom: 3px solid var(--gold);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #444; margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

  .section {
    padding: 16px 16px 0;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.16em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }

  /* ── MATCH INFO ── */
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 8px;
  }
  .info-input {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px;
    border-radius: 8px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; width: 100%;
    -webkit-appearance: none;
  }
  .info-input:focus { outline: none; border-color: var(--gold); }
  .info-input.full { grid-column: span 2; }

  /* ── TEAM CARDS ── */
  .teams-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 8px;
  }
  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .team-card.home { border-top: 3px solid var(--gold); }
  .team-card.away { border-top: 3px solid #e53e3e; }

  .team-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; color: var(--muted);
    text-transform: uppercase;
  }
  .team-name-input {
    background: #222; border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px;
    border-radius: 6px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; width: 100%;
    text-transform: uppercase; -webkit-appearance: none;
  }
  .team-name-input:focus { outline: none; border-color: var(--gold); }

  /* Score counter */
  .counter-row {
    display: flex; align-items: center;
    justify-content: space-between; gap: 6px;
  }
  .counter-label {
    font-size: 11px; color: var(--muted);
    font-weight: 600; flex-shrink: 0;
  }
  .counter-controls {
    display: flex; align-items: center; gap: 6px;
  }
  .cnt-btn {
    width: 40px; height: 40px; border-radius: 8px;
    border: none; background: #2a2a2a;
    color: var(--text); font-size: 22px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.12s;
    font-family: 'Barlow Condensed', sans-serif;
    user-select: none;
  }
  .cnt-btn:active { transform: scale(0.9); background: var(--gold); color: #111; }
  .cnt-btn.minus:active { background: #e53e3e; color: #fff; }
  .cnt-val {
    width: 38px; text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900; color: var(--text);
  }

  /* ── ACTION BUTTONS ── */
  .actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 16px;
  }
  .act-btn {
    padding: 16px; border-radius: 10px; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .act-btn:active { transform: scale(0.96); }
  .act-btn.primary { background: var(--gold); color: #111; }
  .act-btn.danger  { background: #2a1a1a; color: #e53e3e; border: 1px solid #e53e3e44; }
  .act-btn.full    { grid-column: span 2; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222; color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1px solid #333; transition: transform 0.3s;
    white-space: nowrap; z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Divider */
  .divider {
    height: 1px; background: var(--border);
    margin: 16px 16px 0;
  }
</style>
</head>
<body>

<header>
  <span>🏐</span>
  <h1>Volley Control</h1>
  <div class="status-dot" id="status-dot"></div>
</header>

<!-- MATCH INFO -->
<div class="section">
  <div class="section-title">Competizione</div>
  <div class="info-grid">
    <input class="info-input full" id="inp-comp-label" placeholder="Es. Eccellenza FIPAV" value="Eccellenza FIPAV">
    <input class="info-input full" id="inp-comp-name"  placeholder="Es. Finale 3°-4° Posto" value="Finale 3° - 4° Posto">
  </div>
</div>

<div class="divider"></div>

<!-- TEAMS -->
<div class="section">
  <div class="section-title">Squadre e Punteggio</div>
  <div class="teams-grid">

    <!-- HOME -->
    <div class="team-card home">
      <span class="team-label">Casa</span>
      <input class="team-name-input" id="inp-home-name" value="BEDIZZOLE" placeholder="Nome">
      <div class="counter-row">
        <span class="counter-label">Punti</span>
        <div class="counter-controls">
          <button class="cnt-btn minus" ontouchstart="" onclick="change('homeScore',-1)">−</button>
          <span class="cnt-val" id="val-homeScore">0</span>
          <button class="cnt-btn" ontouchstart="" onclick="change('homeScore',+1)">+</button>
        </div>
      </div>
      <div class="counter-row">
        <span class="counter-label">Set</span>
        <div class="counter-controls">
          <button class="cnt-btn minus" ontouchstart="" onclick="change('homeSets',-1)">−</button>
          <span class="cnt-val" id="val-homeSets">0</span>
          <button class="cnt-btn" ontouchstart="" onclick="change('homeSets',+1)">+</button>
        </div>
      </div>
    </div>

    <!-- AWAY -->
    <div class="team-card away">
      <span class="team-label">Ospite</span>
      <input class="team-name-input" id="inp-away-name" value="PISOGNE" placeholder="Nome">
      <div class="counter-row">
        <span class="counter-label">Punti</span>
        <div class="counter-controls">
          <button class="cnt-btn minus" ontouchstart="" onclick="change('awayScore',-1)">−</button>
          <span class="cnt-val" id="val-awayScore">0</span>
          <button class="cnt-btn" ontouchstart="" onclick="change('awayScore',+1)">+</button>
        </div>
      </div>
      <div class="counter-row">
        <span class="counter-label">Set</span>
        <div class="counter-controls">
          <button class="cnt-btn minus" ontouchstart="" onclick="change('awaySets',-1)">−</button>
          <span class="cnt-val" id="val-awaySets">0</span>
          <button class="cnt-btn" ontouchstart="" onclick="change('awaySets',+1)">+</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="divider"></div>

<!-- ACTIONS -->
<div class="actions">
  <button class="act-btn primary full" onclick="pushAll()">💾 Salva tutto</button>
  <button class="act-btn danger" onclick="resetScores()">🔄 Reset punti</button>
  <button class="act-btn danger" onclick="resetAll()">⚠️ Reset totale</button>
</div>

<div id="toast">Salvato!</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ SOSTITUISCI con la tua config Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCJLdA9iKxoR3WJSrjGM7ltUpjpDRNyiyQ",
    authDomain: "volley-overlay.firebaseapp.com",
    databaseURL: "https://volley-overlay-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "volley-overlay",
    storageBucket: "volley-overlay.firebasestorage.app",
    messagingSenderId: "643750913822",
    appId: "1:643750913822:web:3c1fde3fdceb6a71e3cb0f"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const matchRef = ref(db, 'match');

  // Stato locale
  const state = {
    compLabel: 'Eccellenza FIPAV',
    compName:  'Finale 3° - 4° Posto',
    homeName: 'BEDIZZOLE', awayName: 'PISOGNE',
    homeScore: 0, awayScore: 0,
    homeSets: 0,  awaySets: 0
  };

  // Legge stato iniziale da Firebase
  onValue(matchRef, (snap) => {
    const d = snap.val();
    if (!d) return;
    Object.assign(state, d);
    document.getElementById('inp-comp-label').value = d.compLabel || '';
    document.getElementById('inp-comp-name').value  = d.compName  || '';
    document.getElementById('inp-home-name').value  = d.homeName  || '';
    document.getElementById('inp-away-name').value  = d.awayName  || '';
    ['homeScore','awayScore','homeSets','awaySets'].forEach(k => {
      document.getElementById('val-'+k).textContent = d[k] ?? 0;
      state[k] = d[k] ?? 0;
    });
    document.getElementById('status-dot').classList.add('live');
  }, { onlyOnce: true });

  function toast(msg = 'Salvato!') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // Esponi funzioni globalmente
  window.change = function(key, delta) {
    state[key] = Math.max(0, (state[key] || 0) + delta);
    document.getElementById('val-'+key).textContent = state[key];
    pushAll(false);
  };

  window.pushAll = function(showToast = true) {
    state.compLabel = document.getElementById('inp-comp-label').value;
    state.compName  = document.getElementById('inp-comp-name').value;
    state.homeName  = document.getElementById('inp-home-name').value.toUpperCase();
    state.awayName  = document.getElementById('inp-away-name').value.toUpperCase();
    set(matchRef, state);
    if (showToast) toast('Salvato!');
  };

  window.resetScores = function() {
    state.homeScore = 0; state.awayScore = 0;
    ['homeScore','awayScore'].forEach(k => document.getElementById('val-'+k).textContent = 0);
    set(matchRef, state);
    toast('Punti azzerati');
  };

  window.resetAll = function() {
    if (!confirm('Azzerare tutto (punti + set)?')) return;
    state.homeScore = 0; state.awayScore = 0;
    state.homeSets  = 0; state.awaySets  = 0;
    ['homeScore','awayScore','homeSets','awaySets'].forEach(k => document.getElementById('val-'+k).textContent = 0);
    set(matchRef, state);
    toast('Reset completo');
  };
</script>
</body>
</html>
